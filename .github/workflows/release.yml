name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install packages
        uses: pnpm/action-setup@v6

      - name: Build data
        run: pnpm build

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/*.csv
            build/*.json